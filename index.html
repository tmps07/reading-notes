<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>我的閱讀筆記</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Docsify 基礎樣式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />

  <!-- 深色程式碼高亮主題：需放在 Docsify theme 後面 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prism-themes@1/themes/prism-one-dark.css" />

  <style>
    :root {
      --theme-color: #2b7a78;
      --base-font-size: 16px;
      --content-max-width: 980px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    .markdown-section {
      max-width: 980px;
      line-height: 1.8;
    }

    .markdown-section pre {
      background: #1e1e1e !important;
      border-radius: 8px;
      padding: 1rem;
    }

    .markdown-section code {
      font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
    }

    .sidebar {
      font-size: 15px;
    }
  </style>
</head>

<body>
  <div id="app">載入閱讀筆記中...</div>

  <script>
    window.$docsify = {
      name: "我的閱讀筆記",
      repo: "",
      homepage: "README.md",

      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,

      search: {
        maxAge: 86400000,
        paths: "auto",
        placeholder: "搜尋筆記",
        noData: "找不到相關內容",
        depth: 4
      },

      latex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"]]
      }
    };
  </script>

  <!-- Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- 搜尋 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- LaTeX：MathJax + docsify-latex，順序要在 docsify 後面 -->
  <script src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-latex@0"></script>

  <!-- Prism 額外語言支援 -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-asm6502.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-css.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markup.min.js"></script>
</body>
</html>
